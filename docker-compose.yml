services:
  nuheat:
    build: .
    container_name: nuheat-control
    restart: unless-stopped
    ports:
      - "8777:8080"
    env_file:
      - .env
    environment:
      # Container TZ — defaults to America/Chicago. Override in .env if your
      # thermostats are in a different timezone. NuHeat schedule events are
      # interpreted in the thermostat's local time, so the container needs to
      # match for "Hold Until Next Event" to compute correctly.
      - TZ=${TZ:-America/Chicago}
    volumes:
      - nuheat-logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  nuheat-logs:
