<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NuHeat Activity Log</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }

        header {
            background: #16213e;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #0f3460;
        }

        header h1 {
            font-size: 22px;
            font-weight: 600;
            color: #e94560;
        }

        .header-links {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .header-links a {
            color: #4ecca3;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .header-links a:hover { text-decoration: underline; }

        .toolbar {
            background: #16213e;
            padding: 12px 24px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid #0f3460;
        }

        .filter-btn {
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid #0f3460;
            background: transparent;
            color: #888;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-btn:hover { border-color: #1a4a8a; color: #e0e0e0; }
        .filter-btn.active { border-color: #e94560; color: #e94560; background: #e945601a; }

        .auto-refresh-label {
            margin-left: auto;
            font-size: 12px;
            color: #888;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .auto-refresh-label input {
            accent-color: #e94560;
        }

        .log-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 24px;
        }

        .log-entry {
            display: grid;
            grid-template-columns: 180px 90px 1fr;
            gap: 12px;
            padding: 10px 16px;
            border-bottom: 1px solid #0f346040;
            font-size: 13px;
            align-items: start;
        }

        .log-entry:hover { background: #16213e; }

        .log-time {
            color: #555;
            font-family: monospace;
            font-size: 12px;
        }

        .log-category {
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
            white-space: nowrap;
        }

        .log-category.auth { background: #4590e91a; color: #4590e9; }
        .log-category.poll { background: #4ecca31a; color: #4ecca3; }
        .log-category.write { background: #e9a0451a; color: #e9a045; }
        .log-category.rate_limit { background: #e945601a; color: #e94560; }
        .log-category.refresh { background: #a855f71a; color: #a855f7; }
        .log-category.error { background: #e945601a; color: #e94560; }

        .log-message {
            color: #e0e0e0;
        }

        .log-details {
            color: #555;
            font-family: monospace;
            font-size: 11px;
            margin-top: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: #555;
            font-size: 14px;
        }

        .log-count {
            font-size: 12px;
            color: #555;
            padding: 8px 0;
        }

        @media (max-width: 640px) {
            .log-entry {
                grid-template-columns: 1fr;
                gap: 4px;
            }
            .toolbar { padding: 12px 16px; }
            .log-container { padding: 12px 16px; }
            header h1 { font-size: 18px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Activity Log</h1>
        <div class="header-links">
            <a href="/">Dashboard</a>
            <a href="/api-reference">API</a>
        </div>
    </header>

    <div class="toolbar">
        <button class="filter-btn active" data-category="" onclick="setFilter(this, '')">All</button>
        <button class="filter-btn" data-category="auth" onclick="setFilter(this, 'auth')">Auth</button>
        <button class="filter-btn" data-category="poll" onclick="setFilter(this, 'poll')">Poll</button>
        <button class="filter-btn" data-category="write" onclick="setFilter(this, 'write')">Write</button>
        <button class="filter-btn" data-category="rate_limit" onclick="setFilter(this, 'rate_limit')">Rate Limit</button>
        <button class="filter-btn" data-category="refresh" onclick="setFilter(this, 'refresh')">Refresh</button>
        <button class="filter-btn" data-category="error" onclick="setFilter(this, 'error')">Error</button>
        <label class="auto-refresh-label">
            <input type="checkbox" id="autoRefresh" checked onchange="toggleAutoRefresh()">
            Auto-refresh
        </label>
    </div>

    <div class="log-container" id="logContainer">
        <div class="empty-state">Loading logs...</div>
    </div>

    <script>
        let currentCategory = "";
        let autoRefreshTimer = null;
        const AUTO_REFRESH_MS = 5000;

        function setFilter(btn, category) {
            currentCategory = category;
            document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            fetchLogs();
        }

        function toggleAutoRefresh() {
            if (document.getElementById("autoRefresh").checked) {
                startAutoRefresh();
            } else {
                stopAutoRefresh();
            }
        }

        function startAutoRefresh() {
            stopAutoRefresh();
            autoRefreshTimer = setInterval(fetchLogs, AUTO_REFRESH_MS);
        }

        function stopAutoRefresh() {
            if (autoRefreshTimer) {
                clearInterval(autoRefreshTimer);
                autoRefreshTimer = null;
            }
        }

        function formatTime(isoStr) {
            const d = new Date(isoStr);
            return d.toLocaleTimeString() + "." + String(d.getMilliseconds()).padStart(3, "0")
                   + " " + d.toLocaleDateString();
        }

        function formatDetails(details) {
            if (!details || Object.keys(details).length === 0) return "";
            const parts = Object.entries(details)
                .filter(([_, v]) => v !== null && v !== undefined)
                .map(([k, v]) => `${k}=${v}`);
            return parts.length ? parts.join("  ") : "";
        }

        async function fetchLogs() {
            try {
                let url = "/api/logs?limit=200";
                if (currentCategory) url += "&category=" + currentCategory;
                const resp = await fetch(url);
                if (!resp.ok) throw new Error("Failed");
                const data = await resp.json();
                renderLogs(data.entries);
            } catch (e) {
                document.getElementById("logContainer").innerHTML =
                    '<div class="empty-state">Failed to load logs.</div>';
            }
        }

        function renderLogs(entries) {
            if (entries.length === 0) {
                document.getElementById("logContainer").innerHTML =
                    '<div class="empty-state">No log entries' +
                    (currentCategory ? ' for category "' + currentCategory + '"' : '') +
                    '.</div>';
                return;
            }

            let html = '<div class="log-count">' + entries.length + ' entries</div>';

            html += entries.map(e => {
                const details = formatDetails(e.details);
                return `
                    <div class="log-entry">
                        <span class="log-time">${formatTime(e.timestamp)}</span>
                        <span class="log-category ${e.category}">${e.category}</span>
                        <div>
                            <span class="log-message">${e.message}</span>
                            ${details ? '<div class="log-details">' + details + '</div>' : ''}
                        </div>
                    </div>
                `;
            }).join("");

            document.getElementById("logContainer").innerHTML = html;
        }

        fetchLogs();
        startAutoRefresh();
    </script>
</body>
</html>
