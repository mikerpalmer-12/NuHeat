<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NuHeat Thermostat Control</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="128x128" href="/icon.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }

        header {
            background: #16213e;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #0f3460;
        }

        header h1 {
            font-size: 22px;
            font-weight: 600;
            color: #e94560;
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .unit-toggle {
            background: #0f3460;
            border: none;
            color: #e0e0e0;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .unit-toggle:hover { background: #1a4a8a; }

        .refresh-btn {
            background: #0f3460;
            border: none;
            color: #e0e0e0;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .refresh-btn:hover { background: #1a4a8a; }
        .refresh-btn.spinning { animation: spin 1s linear infinite; }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.connected { background: #4ecca3; }
        .status-dot.disconnected { background: #e94560; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
            padding: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: #16213e;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #0f3460;
            transition: border-color 0.3s;
        }

        .card:hover { border-color: #1a4a8a; }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .card-serial {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }

        .card-badges {
            display: flex;
            gap: 8px;
        }

        .badge {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge.heating {
            background: #e945601a;
            color: #e94560;
            border: 1px solid #e9456040;
        }

        .badge.idle {
            background: #4ecca31a;
            color: #4ecca3;
            border: 1px solid #4ecca340;
        }

        .badge.offline {
            background: #8882;
            color: #888;
            border: 1px solid #8884;
        }

        .badge.online {
            background: #4ecca31a;
            color: #4ecca3;
            border: 1px solid #4ecca340;
        }

        .badge.pending {
            background: #8882;
            color: #aaa;
            border: 1px solid #8884;
        }

        .badge.verifying {
            background: #5b8def1a;
            color: #5b8def;
            border: 1px solid #5b8def40;
        }

        .badge.retrying {
            background: #f5a62b1a;
            color: #f5a62b;
            border: 1px solid #f5a62b40;
        }

        .badge.failed {
            background: #e945601a;
            color: #e94560;
            border: 1px solid #e9456040;
        }

        .badge.failed-detail {
            display: block;
            font-size: 10px;
            font-weight: 400;
            text-transform: none;
            letter-spacing: 0;
            color: #e94560;
            margin-top: 6px;
            padding: 6px 10px;
            background: #e9456014;
            border-radius: 8px;
            border: 1px solid #e9456030;
        }

        .temp-display {
            text-align: center;
            margin: 24px 0;
        }

        .current-temp {
            font-size: 64px;
            font-weight: 300;
            color: #fff;
            line-height: 1;
        }

        .current-temp .unit {
            font-size: 28px;
            color: #888;
            vertical-align: super;
        }

        .current-label {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }

        .target-section {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .target-label {
            font-size: 13px;
            color: #888;
        }

        .target-value {
            font-size: 28px;
            font-weight: 500;
            color: #e94560;
            min-width: 90px;
            text-align: center;
        }

        .target-controls {
            display: flex;
            gap: 8px;
        }

        .temp-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid #0f3460;
            background: transparent;
            color: #e0e0e0;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            line-height: 1;
        }

        .temp-btn:hover {
            border-color: #e94560;
            color: #e94560;
        }

        .temp-btn:active {
            background: #e945601a;
        }

        .temp-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn.primary {
            background: #e94560;
            color: #fff;
        }

        .action-btn.primary:hover { background: #d63851; }

        .action-btn.secondary {
            background: #0f3460;
            color: #e0e0e0;
        }

        .action-btn.secondary:hover { background: #1a4a8a; }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .schedule-info {
            font-size: 12px;
            color: #888;
            text-align: center;
            margin-bottom: 16px;
        }

        .schedule-info .mode {
            color: #4ecca3;
            font-weight: 500;
        }

        .schedule-toggle {
            background: none;
            border: none;
            color: #4ecca3;
            font-size: 12px;
            cursor: pointer;
            padding: 0;
            margin-left: 8px;
        }

        .schedule-toggle:hover { text-decoration: underline; }

        .schedule-panel {
            margin-top: 12px;
            border-top: 1px solid #0f3460;
            padding-top: 12px;
        }

        .schedule-day {
            margin-bottom: 8px;
        }

        .schedule-day-name {
            font-size: 12px;
            font-weight: 600;
            color: #888;
            margin-bottom: 4px;
        }

        .schedule-events {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .schedule-event {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            gap: 6px;
        }

        .schedule-event .ev-type {
            color: #888;
            min-width: 48px;
        }

        .schedule-event .ev-time {
            color: #4ecca3;
            font-family: monospace;
        }

        .schedule-event .ev-temp {
            color: #e94560;
            font-family: monospace;
        }

        .schedule-event.inactive {
            opacity: 0.35;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success { background: #4ecca3; color: #1a1a2e; }
        .toast.error { background: #e94560; color: #fff; }

        .loading {
            text-align: center;
            padding: 80px 24px;
            color: #888;
            font-size: 16px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #0f3460;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @media (max-width: 480px) {
            .grid { padding: 16px; gap: 16px; }
            .card { padding: 20px; }
            .current-temp { font-size: 52px; }
            header h1 { font-size: 18px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>NuHeat Control</h1>
        <div class="header-controls">
            <a href="/api-reference" style="color:#4ecca3;text-decoration:none;font-size:14px;font-weight:500">API</a>
            <a href="/logs" style="color:#4ecca3;text-decoration:none;font-size:14px;font-weight:500">Logs</a>
            <a href="/settings" style="color:#4ecca3;text-decoration:none;font-size:14px;font-weight:500">Settings</a>
            <span class="status-dot disconnected" id="statusDot"></span>
            <button class="unit-toggle" id="unitToggle" onclick="toggleUnit()">°F</button>
            <button class="refresh-btn" id="refreshBtn" onclick="refresh()">&#8635;</button>
        </div>
    </header>

    <div id="content">
        <div class="loading">
            <div class="loading-spinner"></div>
            Loading thermostats...
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let thermostats = [];
        let useFahrenheit = true;
        let pendingTargets = {};
        let refreshTimer = null;
        let debounceTimers = {};
        let scheduleCache = {};
        let scheduleVisible = {};

        const AUTO_REFRESH_MS = 5000;  // cache-only read; cheap. Surfaces _writeStatus transitions in near-real-time.
        const DEBOUNCE_MS = 2000;

        function formatTemp(celsius) {
            if (useFahrenheit) {
                return Math.round(celsius * 9 / 5 + 32) + "°F";
            }
            return celsius.toFixed(1) + "°C";
        }

        function tempStep() {
            return useFahrenheit ? 1 : 0.5;
        }

        function getTargetC(serial) {
            if (pendingTargets[serial] !== undefined) {
                return pendingTargets[serial];
            }
            const t = thermostats.find(t => t.serial_number === serial);
            return t ? t.target_temperature_c : 22;
        }

        function toggleUnit() {
            useFahrenheit = !useFahrenheit;
            document.getElementById("unitToggle").textContent = useFahrenheit ? "°F" : "°C";
            render();
        }

        function showToast(message, type = "success") {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.className = "toast " + type + " show";
            setTimeout(() => { toast.className = "toast " + type; }, 3000);
        }

        async function fetchThermostats() {
            try {
                const resp = await fetch("/api/thermostats");
                if (!resp.ok) throw new Error("Failed to fetch");
                thermostats = await resp.json();
                scheduleCache = {};  // clear so visible schedules re-fetch fresh data
                // Re-fetch schedules for any currently visible panels
                for (const serial of Object.keys(scheduleVisible)) {
                    if (scheduleVisible[serial]) {
                        fetch(`/api/thermostats/${serial}/schedule`)
                            .then(r => r.ok ? r.json() : null)
                            .then(data => { if (data) { scheduleCache[serial] = data.schedule; render(); } });
                    }
                }
                document.getElementById("statusDot").className = "status-dot connected";
                return true;
            } catch (e) {
                document.getElementById("statusDot").className = "status-dot disconnected";
                return false;
            }
        }

        async function refresh() {
            const btn = document.getElementById("refreshBtn");
            btn.classList.add("spinning");
            await fetchThermostats();
            pendingTargets = {};
            render();
            btn.classList.remove("spinning");
        }

        function adjustTemp(serial, delta) {
            const current = getTargetC(serial);
            const t = thermostats.find(t => t.serial_number === serial);
            if (!t) return;

            let newC;
            if (useFahrenheit) {
                const currentF = Math.round(current * 9 / 5 + 32);
                const newF = currentF + delta;
                newC = (newF - 32) * 5 / 9;
            } else {
                newC = current + delta;
            }

            newC = Math.max(t.min_temperature_c, Math.min(t.max_temperature_c, newC));
            pendingTargets[serial] = newC;
            render();
            scheduleAutoSend(serial);
        }

        function scheduleAutoSend(serial) {
            if (debounceTimers[serial]) clearTimeout(debounceTimers[serial]);
            debounceTimers[serial] = setTimeout(async () => {
                delete debounceTimers[serial];
                const targetC = getTargetC(serial);
                try {
                    const resp = await fetch(`/api/thermostats/${serial}/temperature`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ temperature_c: targetC }),
                    });
                    if (!resp.ok) throw new Error("Failed");
                    delete pendingTargets[serial];
                    showToast("Temperature set to " + formatTemp(targetC));
                    setTimeout(refresh, 2000);
                } catch (e) {
                    showToast("Failed to set temperature", "error");
                }
            }, DEBOUNCE_MS);
        }

        async function resumeSchedule(serial) {
            const btn = document.querySelector(`[data-resume="${serial}"]`);
            if (btn) btn.disabled = true;

            try {
                const resp = await fetch(`/api/thermostats/${serial}/resume`, {
                    method: "POST",
                });
                if (!resp.ok) throw new Error("Failed");
                showToast("Schedule resumed");
                setTimeout(refresh, 2000);
            } catch (e) {
                showToast("Failed to resume schedule", "error");
            }

            if (btn) btn.disabled = false;
        }

        async function toggleSchedule(serial) {
            if (scheduleVisible[serial]) {
                scheduleVisible[serial] = false;
                render();
                return;
            }
            // Fetch schedule if not cached
            if (!scheduleCache[serial]) {
                try {
                    const resp = await fetch(`/api/thermostats/${serial}/schedule`);
                    if (!resp.ok) throw new Error("Failed");
                    const data = await resp.json();
                    scheduleCache[serial] = data.schedule;
                } catch (e) {
                    showToast("Failed to load schedule", "error");
                    return;
                }
            }
            scheduleVisible[serial] = true;
            render();
        }

        const WRITE_STATUS_LABELS = {
            pending: "Queued",
            verifying: "Verifying",
            retrying: "Retrying",
            failed: "Failed",
        };

        function renderWriteBadge(ws) {
            if (!ws || !ws.state || ws.state === "ok") return "";
            const label = WRITE_STATUS_LABELS[ws.state] || ws.state;
            return '<span class="badge ' + ws.state + '">' + label + '</span>';
        }

        function renderFailedDetail(ws) {
            if (!ws || ws.state !== "failed") return "";
            const err = ws.lastError ? escapeHtml(ws.lastError) : "Write did not propagate to NuHeat";
            return '<div class="badge failed-detail">' + err + '</div>';
        }

        function escapeHtml(s) {
            return String(s)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        function formatTime12(clock) {
            if (!clock) return "";
            const parts = clock.split(":");
            let h = parseInt(parts[0]);
            const m = parts[1];
            const ampm = h >= 12 ? "PM" : "AM";
            if (h === 0) h = 12;
            else if (h > 12) h -= 12;
            return h + ":" + m + " " + ampm;
        }

        function renderSchedulePanel(serial) {
            const schedule = scheduleCache[serial];
            if (!schedule || !scheduleVisible[serial]) return "";

            let html = '<div class="schedule-panel">';
            for (const day of schedule) {
                html += '<div class="schedule-day">';
                html += '<div class="schedule-day-name">' + day.day + '</div>';
                html += '<div class="schedule-events">';
                for (const ev of day.events) {
                    const cls = ev.active ? "schedule-event" : "schedule-event inactive";
                    const temp = useFahrenheit ? ev.temperature_f + "°F" : ev.temperature_c + "°C";
                    html += '<div class="' + cls + '">' +
                        '<span class="ev-type">' + ev.type + '</span>' +
                        '<span class="ev-time">' + formatTime12(ev.time) + '</span>' +
                        '<span class="ev-temp">' + temp + '</span>' +
                        '</div>';
                }
                html += '</div></div>';
            }
            html += '</div>';
            return html;
        }

        function render() {
            if (thermostats.length === 0) {
                document.getElementById("content").innerHTML =
                    '<div class="loading">No thermostats found.<br>Check your NUHEAT_SERIAL_NUMBERS configuration.</div>';
                return;
            }

            const html = '<div class="grid">' + thermostats.map(t => {
                const serial = t.serial_number;
                const targetC = getTargetC(serial);
                const heatingBadge = t.heating
                    ? '<span class="badge heating">Heating</span>'
                    : '<span class="badge idle">Idle</span>';
                const onlineBadge = t.online
                    ? ''
                    : '<span class="badge offline">Offline</span>';
                const writeBadge = renderWriteBadge(t._writeStatus);
                const failedDetail = renderFailedDetail(t._writeStatus);

                return `
                    <div class="card">
                        <div class="card-header">
                            <div>
                                <div class="card-title">${t.name || "Thermostat"}</div>
                                <div class="card-serial">${serial}${t.group ? " &middot; " + t.group : ""}</div>
                            </div>
                            <div class="card-badges">
                                ${writeBadge}
                                ${heatingBadge}
                                ${onlineBadge}
                            </div>
                        </div>
                        ${failedDetail}

                        <div class="temp-display">
                            <div class="current-temp">
                                ${useFahrenheit ? Math.round(t.current_temperature_f) : t.current_temperature_c.toFixed(1)}<span class="unit">${useFahrenheit ? "°F" : "°C"}</span>
                            </div>
                            <div class="current-label">Current Temperature</div>
                        </div>

                        <div class="target-section">
                            <div>
                                <div class="target-label">Target</div>
                            </div>
                            <div class="target-controls">
                                <button class="temp-btn" onclick="adjustTemp('${serial}', -${tempStep()})">-</button>
                                <div class="target-value">${formatTemp(targetC)}</div>
                                <button class="temp-btn" onclick="adjustTemp('${serial}', ${tempStep()})">+</button>
                            </div>
                        </div>

                        <div class="schedule-info">
                            <span class="mode">${t.hold_info ? t.hold_info.description : t.schedule_mode_name}</span>
                            <button class="schedule-toggle" onclick="toggleSchedule('${serial}')">
                                ${scheduleVisible[serial] ? "Hide Schedule" : "Show Schedule"}
                            </button>
                        </div>

                        <div class="card-actions">
                            <button class="action-btn secondary" data-resume="${serial}" onclick="resumeSchedule('${serial}')">
                                Resume Schedule
                            </button>
                        </div>

                        ${renderSchedulePanel(serial)}
                    </div>
                `;
            }).join("") + '</div>';

            document.getElementById("content").innerHTML = html;
        }

        async function init() {
            await fetchThermostats();
            render();
            refreshTimer = setInterval(async () => {
                await fetchThermostats();
                render();
            }, AUTO_REFRESH_MS);
        }

        init();
    </script>
</body>
</html>
